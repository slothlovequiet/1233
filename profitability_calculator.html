<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Calc — Калькулятор сделок</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1f2530;
    --border2: #2a3040;
    --text: #e8ecf2;
    --muted: #5a6478;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.08);
    --accent-dim2: rgba(0,212,170,0.15);
    --red: #ff5b5b;
    --red-dim: rgba(255,91,91,0.08);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.08);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 48px 24px;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }
  .header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .header p {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* Params grid */
  .params {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .param-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .param-group:focus-within {
    border-color: var(--border2);
  }
  .param-group label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .input-row input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .input-row input:focus {
    border-color: var(--accent);
    background: var(--bg);
  }
  .input-row .unit {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 18px;
  }

  /* KPI bar */
  .kpi-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .kpi .kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .kpi .kpi-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .kpi .kpi-val.green { color: var(--accent); }
  .kpi .kpi-val.red { color: var(--red); }
  .kpi .kpi-val.amber { color: var(--amber); }

  /* Table */
  .tbl-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .tbl-head {
    display: grid;
    grid-template-columns: var(--cols);
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
  }
  .tbl-head div {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 8px;
    text-align: right;
  }
  .tbl-head div:first-child { text-align: left; }

  .tbl-body { }
  .tbl-row {
    display: grid;
    grid-template-columns: var(--cols);
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .tbl-row:last-child { border-bottom: none; }
  .tbl-row:hover { background: var(--surface2); }
  .tbl-row div {
    font-family: var(--mono);
    font-size: 13px;
    padding: 11px 8px;
    text-align: right;
    color: var(--text);
  }
  .tbl-row div:first-child {
    text-align: left;
    font-weight: 500;
    color: var(--muted);
  }
  .tbl-row div.base-num { color: var(--text); font-weight: 600; }
  .c-green { color: var(--accent) !important; }
  .c-red { color: var(--red) !important; }
  .c-amber { color: var(--amber) !important; }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 5px;
    font-weight: 500;
  }
  .badge-green { background: var(--accent-dim2); color: var(--accent); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }

  /* Summary block */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
  }
  .summary h3 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .sum-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }
  .sum-item .s-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .sum-item .s-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
  }
  .sum-item .s-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  @media (max-width: 600px) {
    .tbl-wrap { overflow-x: auto; }
    .tbl-head, .tbl-row { min-width: 680px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>TRADE<span>CALC</span></h1>
    <p>// калькулятор комиссий и потерь по сделкам</p>
  </div>

  <!-- Params -->
  <div class="params">
    <div class="param-group">
      <label>Комиссия клиента</label>
      <div class="input-row">
        <input type="number" id="comm" value="30" min="0" max="100" step="1">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="param-group">
      <label>Процент трейдера</label>
      <div class="input-row">
        <input type="number" id="trader" value="18" min="0" max="100" step="0.1">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="param-group" style="border-color: var(--border2); opacity: 0.8;">
      <label>Вычет при оплате <span style="color:var(--accent);font-size:9px;margin-left:4px;">// авто</span></label>
      <div class="input-row">
        <span style="font-family:var(--mono);font-size:16px;font-weight:500;color:var(--accent);" id="deduct-display">13.85</span>
        <span class="unit">%</span>
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;">= трейдер% ÷ (1 + комиссия%)</div>
    </div>
    <div class="param-group">
      <label>Потеря с 1 заявки</label>
      <div class="input-row">
        <input type="number" id="loss" value="500" min="0" step="1">
        <span class="unit">₽</span>
      </div>
    </div>
    <div class="param-group">
      <label>Кол-во заявок</label>
      <div class="input-row">
        <input type="number" id="count" value="20" min="1" step="1">
        <span class="unit">шт</span>
      </div>
    </div>
  </div>

  <!-- KPI bar -->
  <div class="kpi-bar" id="kpi-bar"></div>

  <!-- Table -->
  <div class="tbl-wrap">
    <div class="tbl-head" style="--cols: 1.4fr 1.2fr 1.1fr 1.2fr 1.2fr 1.3fr 1.3fr;">
      <div>Исходная сумма</div>
      <div>К оплате</div>
      <div>Вычет трейдера</div>
      <div>После вычета</div>
      <div>Потеря (заявок)</div>
      <div>Итог чистый</div>
      <div>Разница</div>
    </div>
    <div class="tbl-body" id="rows"></div>
  </div>

  <!-- Summary -->
  <div class="summary">
    <h3>// итоги по расчётным заявкам</h3>
    <div class="sum-grid" id="summary-grid"></div>
  </div>

</div>

<script>
const amounts = [500, 1000, 2500, 5000, 10000, 25000, 50000, 100000, 250000, 500000];

function fmt(n) {
  return n.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtInt(n) {
  return Math.round(n).toLocaleString('ru-RU');
}

function render() {
  const comm    = parseFloat(document.getElementById('comm').value)   || 0;
  const trader  = parseFloat(document.getElementById('trader').value) || 0;
  const loss1   = parseFloat(document.getElementById('loss').value)   || 0;
  const count   = parseInt(document.getElementById('count').value)    || 1;

  const k1        = 1 + comm / 100;
  // Вычет% от суммы к оплате = трейдер% / (1 + комиссия%)
  // Проверка: withComm * deductPct = base * traderPct ✓
  const deductPct = trader / k1;
  const k2        = 1 - deductPct / 100;
  const kfin      = k1 * k2;
  const pct       = (kfin - 1) * 100;
  const totalLoss = loss1 * count;

  // Обновить отображение авто-вычета
  document.getElementById('deduct-display').textContent = deductPct.toFixed(4);

  // KPI bar
  const kpiData = [
    { label: 'Комиссия клиента', val: '+' + comm.toFixed(1) + '%  →  ×' + k1.toFixed(3), cls: 'green' },
    { label: 'Доход трейдера', val: trader.toFixed(1) + '% от исходной', cls: '' },
    { label: '% вычета от оплаты', val: deductPct.toFixed(4) + '%', cls: 'amber' },
    { label: 'Прирост / убыток', val: (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%', cls: pct >= 0 ? 'green' : 'red' },
    { label: 'Потеря 1 заявки', val: '−' + fmt(loss1) + ' ₽', cls: 'amber' },
    { label: 'Сумм. потеря (' + count + ' заявок)', val: '−' + fmt(totalLoss) + ' ₽', cls: 'red' },
  ];
  document.getElementById('kpi-bar').innerHTML = kpiData.map(k => `
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val ${k.cls}">${k.val}</div>
    </div>
  `).join('');

  // Table rows
  const rows = document.getElementById('rows');
  rows.innerHTML = '';

  amounts.forEach(base => {
    const withComm   = base * k1;
    const deductAmt  = base * (trader / 100);   // трейдер% от исходной суммы
    const afterDeduct = withComm - deductAmt;
    const finalAmt   = afterDeduct - totalLoss;
    const diff       = finalAmt - base;
    const diffPct    = (diff / base * 100).toFixed(2);
    const isPos      = diff >= 0;
    const isFinalPos = finalAmt >= 0;

    const diffCls = isPos ? 'c-green' : 'c-red';
    const diffBadge = isPos ? 'badge-green' : 'badge-red';
    const finalCls = isFinalPos ? '' : 'c-red';

    const row = document.createElement('div');
    row.className = 'tbl-row';
    row.style.setProperty('--cols', '1.4fr 1.2fr 1.1fr 1.2fr 1.2fr 1.3fr 1.3fr');
    row.innerHTML = `
      <div class="base-num">${fmt(base)} ₽</div>
      <div class="c-green">+${fmt(withComm)} ₽</div>
      <div class="c-red">−${fmt(deductAmt)} ₽</div>
      <div>${fmt(afterDeduct)} ₽</div>
      <div class="c-amber">−${fmt(totalLoss)} ₽</div>
      <div class="${finalCls}" style="font-weight:600;">${fmt(finalAmt)} ₽</div>
      <div class="${diffCls}">${isPos ? '+' : ''}${fmt(diff)} ₽<span class="badge ${diffBadge}">${isPos ? '+' : ''}${diffPct}%</span></div>
    `;
    rows.appendChild(row);
  });

  const base2 = 10000;
  const withComm2 = base2 * k1;
  const afterDeduct2 = withComm2 - base2 * (trader / 100);
  const finalAmt2 = afterDeduct2 - totalLoss;
  const diff2 = finalAmt2 - base2;
  const breakEven = kfin > 1 ? totalLoss / (kfin - 1) : 0;

  document.getElementById('summary-grid').innerHTML = `
    <div class="sum-item">
      <div class="s-label">Пример: 10 000 ₽ → итог</div>
      <div class="s-val" style="color:${finalAmt2 >= 0 ? 'var(--accent)' : 'var(--red)'};">${fmt(finalAmt2)} ₽</div>
      <div class="s-sub">${diff2 >= 0 ? '+' : ''}${fmt(diff2)} ₽ от исходной</div>
    </div>
    <div class="divider"></div>
    <div class="sum-item">
      <div class="s-label">Суммарная потеря (${count} заявок)</div>
      <div class="s-val" style="color:var(--red);">−${fmt(totalLoss)} ₽</div>
      <div class="s-sub">${fmt(loss1)} ₽ × ${count} заявок</div>
    </div>
    <div class="divider"></div>
    <div class="sum-item">
      <div class="s-label">Точка безубыточности</div>
      <div class="s-val" style="color:var(--amber);">${breakEven > 0 ? fmt(breakEven) + ' ₽' : 'N/A'}</div>
      <div class="s-sub">мин. сумма сделки для покрытия потерь</div>
    </div>
  `;
}

document.querySelectorAll('input').forEach(el => el.addEventListener('input', render));
render();
</script>
</body>
</html>
